plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
}

android {
    namespace "com.redmagic.sketchfabsbs"
    compileSdk 33

    defaultConfig {
        applicationId "com.redmagic.sketchfabsbs"
        minSdk 30
        targetSdk 33
        versionCode 1
        versionName "0.1"

        externalNativeBuild {
            cmake {
                abiFilters "arm64-v8a"
            }
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    externalNativeBuild {
        cmake {
            path file("src/main/cpp/CMakeLists.txt")
        }
    }
}

dependencies {
    implementation project(":leia-cnsdk")
}
